<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Speisekarte - Platzhalter</title>
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #faf5eb;
      font-family: 'Georgia', serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 2px solid #97a926;
    }
    .header {
      position: absolute;
      top: 8%;
      text-align: center;
      width: 90%;
    }
    h1 {
      color: #1a1a1a;
      font-size: clamp(24px, 5vw, 36px);
      margin-bottom: 10px;
      word-wrap: break-word;
    }
    .subtitle {
      color: #97a926;
      font-size: clamp(12px, 2vw, 16px);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .content {
      text-align: center;
      padding: 20px;
      width: 100%;
    }
    .placeholder-box {
      border: 2px dashed #c8a951;
      border-radius: 20px;
      padding: clamp(40px, 10vw, 80px) clamp(30px, 5vw, 60px);
      background: rgba(151, 169, 38, 0.05);
      margin: 0 auto;
      max-width: 90%;
    }
    .placeholder-text {
      color: #8a8070;
      font-size: clamp(18px, 4vw, 24px);
      margin-bottom: 20px;
    }
    .placeholder-subtext {
      color: #c8a951;
      font-size: clamp(12px, 2vw, 14px);
      line-height: 1.6;
    }
    .decorative-line {
      width: 80px;
      height: 2px;
      background: #97a926;
      margin: 20px auto;
    }
    .footer {
      position: absolute;
      bottom: 8%;
      text-align: center;
      color: #8a8070;
      font-size: clamp(10px, 1.5vw, 12px);
      width: 90%;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lieblingsgrieche</h1>
    <div class="subtitle">by Natasa</div>
  </div>
  
  <div class="content">
    <div class="placeholder-box">
      <div class="placeholder-text">🍽️ Speisekarte</div>
      <div class="decorative-line"></div>
      <div class="placeholder-subtext">
        Platzhalter für PDF-Dokument<br>
        DIN A4 Format (210 × 297 mm)<br><br>
        Hier wird später die vollständige<br>
        Speisekarte als PDF eingebettet.
      </div>
    </div>
  </div>
  
  <div class="footer">
    Neckarstraße 2e · 67125 Dannstadt · Tel: 06321 9398866
  </div>
</body>
</html>
